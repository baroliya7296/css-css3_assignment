<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my gallery</title>
     <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        h1{
            text-align: center;
            background-color: black;
            color: white;
            margin: 10px auto;
        }
        .container{
            display: grid;
            grid-template-columns: repeat(5,150px);
            grid-template-rows: repeat(4,150px);
            justify-content: center;
            gap: 10px;
        }
        .image{
            height: 100%;
            width: 100%;
            border-radius: 20px;
            transition: all 300ms;
        }
        .image:nth-child(1){
            grid-row: 1/2;
            grid-column: 1/3;
        }

        .image:nth-child(2){
            grid-row: 1/2;
            grid-column:3/4 ;
         } 

         .image:nth-child(3){
            grid-row: 1/2;
            grid-column:4/6 ;
         } 

         .image:nth-child(4){
            grid-row: 2/4;
            grid-column:1/2;
         } 

         .image:nth-child(5){
            grid-row: 2/4;
            grid-column:2/5;
         } 

         .image:nth-child(6){
            grid-row: 2/4;
            grid-column:5/6 ;
         } 

         .image:nth-child(7){
            grid-row: 4/5;
            grid-column:1/3 ;
         } 

         .image:nth-child(8){
            grid-row: 4/5;
            grid-column:3/4 ;
         } 

         .image:nth-child(9){
            grid-row: 4/5;
            grid-column:4/6;
         } 

         .image:hover{
            transform:scale(1.1);
         }
     </style>
</head>
<body>
    <div>
        <div><h1>My Image Gallery</h1></div>
        <div class="container">
            <img class="image" src="https://images.pexels.com/photos/147411/italy-mountains-dawn-daybreak-147411.jpeg?auto=compress&cs=tinysrgb&w=400" alt="image not loading">

            <img class="image" src="https://images.pexels.com/photos/757889/pexels-photo-757889.jpeg?auto=compress&cs=tinysrgb&w=400" alt="image not loading">

            <img class="image" src="https://images.pexels.com/photos/1659438/pexels-photo-1659438.jpeg?auto=compress&cs=tinysrgb&w=400" alt="image not loading">

            <img class="image" src="https://images.pexels.com/photos/74512/pexels-photo-74512.jpeg?auto=compress&cs=tinysrgb&w=400" alt="image not loading">

            <img class="image" src="https://images.pexels.com/photos/236599/pexels-photo-236599.jpeg?auto=compress&cs=tinysrgb&w=400" alt="image not loading">

            <img class="image" src="https://images.pexels.com/photos/1187079/pexels-photo-1187079.jpeg?auto=compress&cs=tinysrgb&w=400" alt="image not loading">

            <img class="image" src="https://images.pexels.com/photos/1477166/pexels-photo-1477166.jpeg?auto=compress&cs=tinysrgb&w=400" alt="image not loading">
            
            <img class="image" src="https://images.pexels.com/photos/736230/pexels-photo-736230.jpeg" alt="image not loading">

            <img class="image" src="https://images.pexels.com/photos/5852421/pexels-photo-5852421.jpeg?auto=compress&cs=tinysrgb&w=400&lazy=load" alt="image not loading">
        </div>
    </div>
</body>
</html>
