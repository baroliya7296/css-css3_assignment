<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .header{
            height: 100%;
            margin: 0;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(1,100px);
            gap: 40px;
            justify-content: center;
        }
        .child{
            height: 100px;
            width: 100px;
            border: 2px solid black;
            border-radius: 24px;
            background-color: cadetblue;
            text-align: center;
            padding: 10px;
        }
        @media (min-width:768px) {
            .header{
                grid-template-columns: repeat(2,100px);
                font-size: 20px;
                font-weight: 600;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="child">HTML</div>
        <div class="child">CSS</div>
        <div class="child">Javascript</div>
        <div class="child">Bootstrap</div>
        <div class="child">Wordpress</div>
        <div class="child">Tailwind</div>
        <div class="child">React js</div>
        <div class="child">Scss</div>
    </div>
</body>
</html>
