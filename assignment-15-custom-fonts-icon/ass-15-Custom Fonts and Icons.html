<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom font family</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
<style>
    *{
        padding: 0;
        margin: 0;
        width: 100%;
    }
    .hero-section{
        background-color: darkgray;
        padding:0;
        margin: 0 auto;
        text-align: center;
    }
    .hero-top-bar{
        height: 50px;
        font-family: 'Roboto', sans-serif;
    }
    .features-section{
        background-color: darkseagreen;
        text-align: center;
        margin: 10px auto;
        height: 300px;
    } 
    #logo{
        margin-top: 10px;
        padding: 10px;
    }
    
</style>
</head>
<body>
    <div class="hero-section">
         <div class="hero-top-bar">
            <h1>My Portfolio</h1>
        </div>
    </div>
    <div class="features-section">
             <div><i class="fa-brands fa-instagram" id="logo"></i>instagram</div>
             <div><i class="fa-brands fa-github" id="logo"></i>Github</div>
             <div><i class="fa-brands fa-linkedin" id="logo"></i>linkedin</div>
             <div><i class="fa-brands fa-facebook" id="logo"></i>facebook</div>
    </div>
</body>
</html>
